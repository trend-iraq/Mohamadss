<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1520"/>
      <stop offset="100%" style="stop-color:#0a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00ff88" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="4" y="4" width="504" height="504" rx="98" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.6"/>

  <!-- Hexagon shape -->
  <polygon points="256,60 380,130 380,270 256,340 132,270 132,130" fill="none" stroke="url(#glow)" stroke-width="2.5" opacity="0.4"/>

  <!-- Inner hexagon -->
  <polygon points="256,90 356,148 356,262 256,320 156,262 156,148" fill="rgba(0,255,136,0.05)" stroke="url(#glow)" stroke-width="1.5" opacity="0.6"/>

  <!-- Center circle -->
  <circle cx="256" cy="205" r="65" fill="url(#glow)" filter="url(#shadow)"/>

  <!-- Chinese store icon inside circle - stylized "中" -->
  <text x="256" y="230" text-anchor="middle" font-size="72" font-weight="900" fill="#050a0f" font-family="serif">中</text>

  <!-- Arabic text المجمع -->
  <text x="256" y="385" text-anchor="middle" font-size="52" font-weight="900" fill="url(#glow)" font-family="Cairo, Tajawal, Arial" filter="url(#shadow)">المجمع</text>

  <!-- Arabic text الصيني -->
  <text x="256" y="450" text-anchor="middle" font-size="40" font-weight="700" fill="#00d4ff" font-family="Cairo, Tajawal, Arial" opacity="0.9">الصيني</text>

  <!-- Decorative dots -->
  <circle cx="100" cy="205" r="4" fill="#00ff88" opacity="0.5"/>
  <circle cx="412" cy="205" r="4" fill="#00ff88" opacity="0.5"/>
  <circle cx="256" cy="70" r="3" fill="#00d4ff" opacity="0.4"/>
</svg>
